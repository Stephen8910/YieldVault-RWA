<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YieldVault — Institutional RWA Yields on Stellar</title>
    <meta name="description" content="Deposit USDC to earn stable, predictable yield backed by tokenized Sovereign Debt and Real-World Assets on the Stellar network." />
    <!-- Prevent flash of unstyled content: apply saved theme before first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved === 'light' || saved === 'dark'
            ? saved
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p style="padding:2rem;text-align:center;font-family:system-ui,sans-serif">
        JavaScript is required to use YieldVault. Please enable JavaScript in your browser settings.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
